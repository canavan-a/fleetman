name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: linux-armv7

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags "-X 'main.Version=${{ github.ref_name }}'" \
            -o dist/fleet-agent-${{ matrix.suffix }} \
            ./agent

      - name: Build server
        if: matrix.goarch == 'amd64'
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build \
            -o dist/fleetman-server-linux-amd64 \
            ./server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: dist/

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate install.sh
        run: |
          sed \
            -e 's|{{REPO}}|${{ github.repository }}|g' \
            -e 's|{{VERSION}}|${{ github.ref_name }}|g' \
            scripts/install.sh.tmpl > dist/install.sh
          chmod +x dist/install.sh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/fleet-agent-linux-amd64
            dist/fleet-agent-linux-arm64
            dist/fleet-agent-linux-armv7
            dist/fleetman-server-linux-amd64
            dist/install.sh
          generate_release_notes: true
