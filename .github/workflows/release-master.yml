name: Release Master

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build master (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,  goarch: amd64, suffix: linux-amd64  }
          - { goos: linux,  goarch: arm64, suffix: linux-arm64  }
          - { goos: linux,  goarch: arm, goarm: "7", suffix: linux-armv7 }
          - { goos: darwin, goarch: amd64, suffix: darwin-amd64 }
          - { goos: darwin, goarch: arm64, suffix: darwin-arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -o dist/fleetman-${{ matrix.suffix }} \
            ./master
      - uses: actions/upload-artifact@v4
        with:
          name: master-${{ matrix.suffix }}
          path: dist/

  release:
    name: Publish master release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate install-master.sh
        run: |
          sed \
            -e 's|{{REPO}}|${{ github.repository }}|g' \
            -e 's|{{VERSION}}|${{ github.ref_name }}|g' \
            scripts/install-master.sh.tmpl > dist/install-master.sh
          chmod +x dist/install-master.sh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/fleetman-linux-amd64
            dist/fleetman-linux-arm64
            dist/fleetman-linux-armv7
            dist/fleetman-darwin-amd64
            dist/fleetman-darwin-arm64
            dist/install-master.sh
          generate_release_notes: false
