name: Release Agent


on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build agent (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64,   suffix: linux-amd64   }
          - { goos: linux, goarch: 386,     suffix: linux-386     }
          - { goos: linux, goarch: arm64,   suffix: linux-arm64   }
          - { goos: linux, goarch: arm, goarm: "5", suffix: linux-armv5 }
          - { goos: linux, goarch: arm, goarm: "6", suffix: linux-armv6 }
          - { goos: linux, goarch: arm, goarm: "7", suffix: linux-armv7 }
          - { goos: linux, goarch: mips64,   suffix: linux-mips64   }
          - { goos: linux, goarch: mips64le, suffix: linux-mips64le }
          - { goos: linux, goarch: ppc64le,  suffix: linux-ppc64le  }
          - { goos: linux, goarch: s390x,    suffix: linux-s390x    }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags "-X 'main.Version=${{ github.ref_name }}'" \
            -o dist/fleet-agent-${{ matrix.suffix }} \
            ./agent
      - uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.suffix }}
          path: dist/

  release:
    name: Publish agent release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate agent-install.sh and agent-uninstall.sh
        run: |
          sed \
            -e 's|{{REPO}}|${{ github.repository }}|g' \
            -e 's|{{VERSION}}|${{ github.ref_name }}|g' \
            scripts/install.sh.tmpl > dist/agent-install.sh
          chmod +x dist/agent-install.sh
          cp scripts/uninstall.sh dist/agent-uninstall.sh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/fleet-agent-linux-amd64
            dist/fleet-agent-linux-386
            dist/fleet-agent-linux-arm64
            dist/fleet-agent-linux-armv5
            dist/fleet-agent-linux-armv6
            dist/fleet-agent-linux-armv7
            dist/fleet-agent-linux-mips64
            dist/fleet-agent-linux-mips64le
            dist/fleet-agent-linux-ppc64le
            dist/fleet-agent-linux-s390x
            dist/agent-install.sh
            dist/agent-uninstall.sh
          generate_release_notes: true
