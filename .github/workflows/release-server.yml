name: Release Server

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build server (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64, suffix: linux-amd64 }
          - { goos: linux, goarch: arm64, suffix: linux-arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags "-X main.Version=${{ github.ref_name }} -X main.Repo=${{ github.repository }}" \
            -o dist/fleetman-server-${{ matrix.suffix }} \
            ./server
      - uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.suffix }}
          path: dist/

  release:
    name: Publish server release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate install-server.sh
        run: |
          sed \
            -e 's|{{REPO}}|${{ github.repository }}|g' \
            -e 's|{{VERSION}}|${{ github.ref_name }}|g' \
            scripts/install-server.sh.tmpl > dist/install-server.sh
          chmod +x dist/install-server.sh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/fleetman-server-linux-amd64
            dist/fleetman-server-linux-arm64
            dist/install-server.sh
          generate_release_notes: false
